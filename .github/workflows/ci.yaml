name: ML Pipeline CI

on:
  push:
    branches:
       - main


  pull_request:
       branches:
         - main


jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version : '3.12'

      - name: Install Dependencies

        run: |
           python -m pip install --upgrade pip
           pip install -r requirements.txt

      - name: Install DVC

        run: |
          pip install dvc

      - name: Configure DVC Authentication
        run: |
          dvc remote modify origin auth basic
          dvc remote modify origin  user "${{ secrets.DAGSHUB_USERNAME}}" --local
          dvc remote modify origin password "${{ secrets.DAGSHUB_TOKEN }}" --local

      - name: Pull Dataset
        run: |
          dvc pull
          

      - name: Run DVC pipeline

        run: |
          dvc repro

      - name: Show Metrics

        run: |
          cat reports/metrics.json
          


